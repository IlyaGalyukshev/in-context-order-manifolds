# Stage 0 pilot: end-to-end smoke test + per-stimulus cost measurement.
# Goal is NOT results — it is (a) pipeline works, (b) grid sizing numbers,
# (c) first look at the identifiability test (partial rho in Shuffle).
# Two labs / two tokenizers: OLMo-3 (learned-data-open flagship) + Qwen3 dense.
models: [olmo3-7b-inst, qwen3-4b]
families: [tagged, relational]
conditions: [forward, reverse, shuffle]
n_items_grid: [16]
stimuli_per_cell: 50
pooling_schemes: [name, marker, last_token, card_mean]
layers: all
attention_entropy_subsample: 0.2
battery:
  batch_size: 16
  enable_thinking: false        # Qwen3 chat-template soft switch; no-op for OLMo
  max_new_tokens_default: 48
paths:
  data: /workspace/manifolds/data/pilot
  acts: /workspace/manifolds/acts/pilot
  results: /workspace/manifolds/results/pilot
smoke_tests:
  fp16_logit_kl: true           # per model: fp16 vs fp32 logit KL on 20 prompts before entering grid
