# Committed inputs for dataset generation. The BCS generator itself takes its
# structural parameters (families, N grid, difficulty, degree, structures) as
# CLI args to generate_bcs.py — see README. This file holds the deterministic
# POOLS and the offline LLM pool-authoring config only.
seed: 20260724

entities:
  vocab_size: 500
  max_tokens_per_name: 3           # enforced per tokenizer in the roster

pools:                             # committed artifacts the generator samples from
  predicates: data/pools/event_predicates_v1.json
  entities: data/pools/entities_v1.json

llm_assist:
  # Offline predicate-pool authoring via OpenRouter (generator/llm_assist.py).
  # Outputs are committed to data/pools/; the per-stimulus generator path is
  # deterministic and NEVER calls an API.
  # OPENROUTER_PROXY is REQUIRED — all calls go through it, never direct.
  enabled: false
  api_key_env: OPENROUTER_API_KEY
  base_url_env: OPENROUTER_BASE_URL
  proxy_env: OPENROUTER_PROXY      # mandatory; llm_assist refuses to run without it
  # Supervisor rule: reviewer >= author tier, preferably a different lab.
  author_model: anthropic/claude-sonnet-5
  reviewer_model: openai/gpt-5.5
  predicate_pool_size: 400
